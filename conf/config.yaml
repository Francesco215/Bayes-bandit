defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled
  - _self_

mode: demo

demo:
  houses: 6
  orders: 2000
  seed: 0
  output_dir: outputs
  method: quadrature
  mc_samples: 10000
  grid_points: 2048
  prior:
    mu: 0.0
    kappa: 0.25
    alpha: 4.0
    beta: 2.0

study:
  runs: 200
  steps: 1000
  houses: 10
  seed: 0
  output_dir: outputs
  mean_scale: 1.0
  min_sigma: 0.5
  max_sigma: 1.5
  bayesian_sweep: kappa
  bayesian_fixed_kappa: 1.0
  bayesian_fixed_temperature: 0.015625
  bayesian_fixed_alpha: 4.0
  bayesian_fixed_beta: 2.0
  # Bayesian sweep values are powers of two: 2^min, ..., 2^max.
  bayesian_sweep_min_exponent: -3
  bayesian_sweep_max_exponent: 4

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
